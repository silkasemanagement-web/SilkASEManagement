services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - mongo
      - redis
    volumes:
      - transcripts:/app/transcripts

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mongo_data:
  transcripts:
